variables:
  bootstrap-prefix: /aemeath-tools
  bootstrap-triplet: x86_64-aemeath-linux-gnu
  bootstrap-sysroot: /aemeath-sysroot
  strip-binaries: |
    for i in $(find %{install-root}%{libdir} -type f -name \*.so* ! -name \*dbg) \
      $(find %{install-root}%{libdir} -type f -name \*.a) \
      $(find %{install-root}%{bindir} %{install-root}%{libexecdir} -type f);
    do
      strip --strip-unneeded $i || true
    done
  # Flags
  cflags-common: "-g -O2"
  cflags: >-
    %{cflags-common}
    %{cflags-tune}
    %{cflags-local}
  ldflags: "%{ldflags-local}"

environment:
  PATH: "%{bootstrap-prefix}/bin:/bin"